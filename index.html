<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EnglishApp">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>İngilizce Günlük Pratik</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; color: #38bdf8; margin-bottom: 8px; }
        .header .subtitle { color: #94a3b8; font-size: 14px; }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 120px;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

        /* Stage Navigation */
        .stage-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stage-btn {
            padding: 10px 20px;
            border: 2px solid #334155;
            background: transparent;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .stage-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .stage-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: bold; }
        .stage-btn.completed { border-color: #22c55e; color: #22c55e; }
        .stage-btn.completed::after { content: ' ✓'; }

        /* Content Area */
        .stage-content {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            min-height: 400px;
        }
        .stage-title {
            font-size: 22px;
            color: #38bdf8;
            margin-bottom: 5px;
        }
        .stage-desc {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Word Table */
        .word-table { width: 100%; border-collapse: collapse; }
        .word-table th {
            background: #334155;
            padding: 12px 15px;
            text-align: left;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .word-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
            font-size: 15px;
        }
        .word-table tr:hover td { background: #334155; }
        .word-en { color: #38bdf8; font-weight: 600; }
        .word-pron { color: #94a3b8; font-size: 13px; }
        .word-type {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #cbd5e1;
        }

        /* Quiz */
        .quiz-question {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .quiz-number {
            color: #38bdf8;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .quiz-text { font-size: 16px; line-height: 1.6; margin-bottom: 12px; }
        .quiz-hint { color: #f59e0b; font-style: italic; }
        .quiz-input {
            width: 100%;
            padding: 12px 16px;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .quiz-input:focus { border-color: #38bdf8; }
        .quiz-input.correct { border-color: #22c55e; background: #052e16; }
        .quiz-input.wrong { border-color: #ef4444; background: #350a0a; }
        .quiz-answer {
            margin-top: 8px;
            font-size: 14px;
            display: none;
        }
        .quiz-answer.show { display: block; }
        .quiz-answer.correct-answer { color: #22c55e; }
        .quiz-answer.wrong-answer { color: #ef4444; }

        /* Buttons */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #4ade80; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #475569; }
        .btn-center { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }

        /* Writing Practice */
        .writing-area {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        .writing-area:focus { border-color: #38bdf8; }
        .writing-prompt {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 3px solid #f59e0b;
        }
        .writing-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        .writing-word-tag {
            background: #334155;
            color: #38bdf8;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Results */
        .result-card {
            text-align: center;
            padding: 40px;
        }
        .result-score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
        }
        .result-score.great { color: #22c55e; }
        .result-score.ok { color: #f59e0b; }
        .result-score.bad { color: #ef4444; }
        .result-message { font-size: 18px; color: #94a3b8; margin-bottom: 10px; }
        .result-detail { font-size: 14px; color: #64748b; margin-bottom: 30px; }

        /* Sentence Example Cards */
        .sentence-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .sentence-en { font-size: 16px; margin-bottom: 6px; line-height: 1.5; }
        .sentence-tr { color: #94a3b8; font-size: 14px; line-height: 1.5; }
        .sentence-word-highlight { color: #38bdf8; font-weight: 600; }

        /* Pattern Section */
        .pattern-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 3px solid #a78bfa;
        }
        .pattern-text { font-size: 17px; color: #a78bfa; font-weight: 600; margin-bottom: 4px; }
        .pattern-meaning { color: #94a3b8; font-size: 14px; margin-bottom: 8px; }
        .pattern-example { font-size: 15px; }
        .pattern-example-tr { color: #94a3b8; font-size: 13px; }

        /* Dashboard */
        .dashboard-section { margin-bottom: 30px; }
        .dashboard-section h3 { color: #38bdf8; margin-bottom: 15px; font-size: 18px; }
        .weak-words { display: flex; flex-wrap: wrap; gap: 8px; }
        .weak-word {
            background: #451a03;
            color: #fb923c;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
        }
        .strong-word {
            background: #052e16;
            color: #4ade80;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
        }
        .start-section { text-align: center; margin-top: 30px; }
        .daily-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .daily-info .day-num { font-size: 48px; font-weight: bold; color: #38bdf8; }
        .daily-info .day-label { color: #94a3b8; }

        /* Streak fire */
        .streak-fire { color: #f59e0b; }

        /* Add Word Form */
        .add-form-group { margin-bottom: 15px; }
        .add-form-group label {
            display: block;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .add-form-input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-form-input:focus { border-color: #38bdf8; }
        .add-form-row { display: flex; gap: 15px; }
        .add-form-row .add-form-group { flex: 1; }
        .sentence-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .sentence-input-row input { flex: 1; }
        .remove-sentence-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        .add-sentence-btn {
            background: transparent;
            border: 2px dashed #334155;
            color: #94a3b8;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .add-sentence-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .word-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .word-list-item .word-info { flex: 1; }
        .word-list-item .word-name { color: #38bdf8; font-weight: 600; font-size: 16px; }
        .word-list-item .word-meaning { color: #94a3b8; font-size: 13px; }
        .word-list-item .word-badge {
            background: #334155;
            color: #cbd5e1;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
        .delete-word-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-word-btn:hover { background: #ef4444; color: white; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            padding: 8px 20px;
            border: 2px solid #334155;
            background: transparent;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        .success-msg {
            background: #052e16;
            border: 1px solid #22c55e;
            color: #4ade80;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg.show { display: block; }

        /* Loading spinner */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* PWA Install Banner */
        .pwa-banner {
            background: linear-gradient(135deg, #1e3a5f, #1e293b);
            border: 1px solid #38bdf8;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 15px;
        }
        .pwa-banner.show { display: flex; }
        .pwa-banner-text { flex: 1; }
        .pwa-banner-title { font-size: 15px; font-weight: 600; color: #38bdf8; }
        .pwa-banner-desc { font-size: 13px; color: #94a3b8; margin-top: 3px; }
        .pwa-banner .btn { white-space: nowrap; font-size: 14px; padding: 8px 18px; }
        .pwa-dismiss {
            background: none; border: none; color: #64748b; cursor: pointer;
            font-size: 20px; padding: 0 5px; line-height: 1;
        }

        /* Notification Settings */
        .notif-settings {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
        }
        .notif-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .notif-header .notif-title { font-size: 15px; font-weight: 600; }
        .notif-header .notif-desc { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .notif-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .notif-info { flex: 1; }
        .notif-title { font-size: 15px; font-weight: 600; }
        .notif-desc { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .toggle-switch {
            position: relative;
            width: 50px; height: 28px;
            background: #334155;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: #22c55e; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px; height: 22px;
            background: white;
            border-radius: 50%;
            top: 3px; left: 3px;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(22px); }
        .time-picker {
            display: flex; align-items: center; gap: 8px;
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid #1e293b;
        }
        .time-picker label { font-size: 13px; color: #94a3b8; }
        .time-picker input[type="time"] {
            background: #1e293b; border: 1px solid #334155;
            color: #e2e8f0; padding: 6px 10px; border-radius: 6px;
            font-size: 14px;
        }
        .alarm-list { display: flex; flex-direction: column; gap: 10px; }
        .alarm-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .alarm-card-left { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .alarm-time-display { font-size: 22px; font-weight: 700; color: #e2e8f0; }
        .alarm-days {
            display: flex; gap: 4px; flex-wrap: wrap;
        }
        .alarm-day-badge {
            font-size: 11px; padding: 2px 7px; border-radius: 10px;
            background: #334155; color: #94a3b8; font-weight: 500;
        }
        .alarm-day-badge.active { background: #3b82f6; color: #fff; }
        .alarm-card-actions { display: flex; align-items: center; gap: 8px; }
        .alarm-delete-btn {
            background: none; border: none; color: #ef4444; cursor: pointer;
            font-size: 18px; padding: 4px; line-height: 1;
        }
        .add-alarm-btn {
            width: 100%; padding: 10px; margin-top: 10px;
            background: #1e293b; border: 2px dashed #334155;
            border-radius: 10px; color: #64748b; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .add-alarm-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .alarm-edit-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .alarm-edit-box {
            background: #1e293b; border-radius: 16px;
            padding: 24px; width: 100%; max-width: 340px;
        }
        .alarm-edit-box h3 { margin: 0 0 16px; font-size: 16px; }
        .alarm-edit-box input[type="time"] {
            width: 100%; background: #0f172a; border: 1px solid #334155;
            color: #e2e8f0; padding: 12px; border-radius: 8px;
            font-size: 20px; text-align: center; margin-bottom: 16px;
        }
        .alarm-day-selector {
            display: flex; gap: 6px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 12px;
        }
        .alarm-day-btn {
            width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid #334155; background: none;
            color: #94a3b8; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .alarm-day-btn.selected { border-color: #3b82f6; background: #3b82f6; color: #fff; }
        .alarm-preset-btns {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
        }
        .alarm-preset-btn {
            padding: 5px 12px; border-radius: 8px;
            border: 1px solid #334155; background: none;
            color: #94a3b8; font-size: 12px; cursor: pointer;
        }
        .alarm-preset-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .alarm-edit-actions {
            display: flex; gap: 10px; margin-top: 8px;
        }
        .alarm-edit-actions button {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .alarm-save-btn { background: #3b82f6; color: #fff; }
        .alarm-cancel-btn { background: #334155; color: #e2e8f0; }

        /* Flashcard */
        .fc-container {
            display: flex; flex-direction: column; align-items: center;
            min-height: 400px; padding: 20px 0;
        }
        .fc-progress {
            font-size: 13px; color: #64748b; margin-bottom: 16px;
        }
        .fc-card-wrapper {
            perspective: 800px;
            width: 100%; max-width: 340px; height: 220px;
            margin-bottom: 24px; cursor: pointer;
        }
        .fc-card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        .fc-card.flipped { transform: rotateY(180deg); }
        .fc-card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; text-align: center;
        }
        .fc-front {
            background: linear-gradient(135deg, #1e293b, #334155);
            border: 2px solid #475569;
        }
        .fc-back {
            background: linear-gradient(135deg, #164e63, #1e3a5f);
            border: 2px solid #38bdf8;
            transform: rotateY(180deg);
        }
        .fc-word { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .fc-pron { font-size: 14px; color: #94a3b8; margin-bottom: 12px; }
        .fc-meaning { font-size: 20px; font-weight: 600; color: #38bdf8; margin-bottom: 8px; }
        .fc-sentence { font-size: 13px; color: #cbd5e1; line-height: 1.4; }
        .fc-hint { font-size: 12px; color: #64748b; margin-top: 8px; }
        .fc-actions {
            display: flex; gap: 12px; width: 100%; max-width: 340px;
        }
        .fc-btn {
            flex: 1; padding: 14px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }
        .fc-btn:active { transform: scale(0.96); }
        .fc-btn-know { background: #22c55e; color: #fff; }
        .fc-btn-dontknow { background: #ef4444; color: #fff; }
        .fc-btn-skip { background: #334155; color: #94a3b8; }
        .fc-btn-selected { outline: 3px solid #facc15; outline-offset: 2px; }
        .fc-stats-bar {
            display: flex; gap: 16px; margin-top: 20px;
            font-size: 13px; color: #94a3b8;
        }
        .fc-stats-bar span { display: flex; align-items: center; gap: 4px; }
        .fc-dot-green { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
        .fc-dot-red { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .fc-dot-gray { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .fc-result {
            text-align: center; padding: 30px 0;
        }
        .fc-result h2 { font-size: 22px; margin-bottom: 12px; }
        .fc-result-stats {
            display: flex; justify-content: center; gap: 30px;
            margin: 20px 0;
        }
        .fc-result-stat { text-align: center; }
        .fc-result-stat .num { font-size: 28px; font-weight: 700; }
        .fc-result-stat .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .fc-mode-btns {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
            justify-content: center;
        }
        .fc-mode-btn {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid #334155; background: none;
            color: #94a3b8; font-size: 13px; cursor: pointer;
        }
        .fc-mode-btn.active { border-color: #ec4899; color: #ec4899; background: rgba(236,72,153,0.1); }

        /* TTS & Speaking */
        .speak-btn {
            background: none; border: none; cursor: pointer;

    <!-- Firebase Sync Module -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyApHwqbaRo0G2rJx4hI8Vv1Llkh-a3DUPI",
            authDomain: "englishapp-7d94f.firebaseapp.com",
            projectId: "englishapp-7d94f",
            storageBucket: "englishapp-7d94f.firebasestorage.app",
            messagingSenderId: "513162928162",
            appId: "1:513162928162:web:e44df84625eacb29b52a7b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Generate/get device ID (prevent self-echo loops)
        let deviceId = localStorage.getItem('sync_device_id');
        if (!deviceId) {
            deviceId = 'd_' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('sync_device_id', deviceId);
        }

        let syncCode = localStorage.getItem('sync_code') || null;
        let unsubscribe = null;
        let uploadDebounce = null;
        let isApplyingRemote = false;

        const LS_KEYS = {
            state: 'english_daily_v1',
            customWords: 'english_custom_words_v1',
            learnedPatterns: 'english_learned_patterns_v1',
            wordCategories: 'english_word_categories_v1',
            alarms: 'alarms'
        };

        function collectLocalData() {
            const data = {};
            for (const [key, lsKey] of Object.entries(LS_KEYS)) {
                const raw = localStorage.getItem(lsKey);
                try { data[key] = raw ? JSON.parse(raw) : null; }
                catch(e) { data[key] = null; }
            }
            return data;
        }

        function applyRemoteData(data) {
            if (!data) return;
            isApplyingRemote = true;
            for (const [key, lsKey] of Object.entries(LS_KEYS)) {
                if (data[key] !== undefined && data[key] !== null) {
                    localStorage.setItem(lsKey, JSON.stringify(data[key]));
                }
            }
            isApplyingRemote = false;
            if (typeof window.onSyncRemoteUpdate === 'function') {
                window.onSyncRemoteUpdate();
            }
        }

        async function upload() {
            if (!syncCode || isApplyingRemote) return;
            if (!auth.currentUser) return;

            const data = collectLocalData();
            data.updatedAt = serverTimestamp();
            data.updatedBy = deviceId;

            try {
                await setDoc(doc(db, 'syncs', syncCode), data);
                updateStatus('synced');
            } catch(e) {
                console.error('Upload failed:', e);
                updateStatus('error');
            }
        }

        function scheduleUpload() {
            if (!syncCode || isApplyingRemote) return;
            clearTimeout(uploadDebounce);
            updateStatus('pending');
            uploadDebounce = setTimeout(upload, 1500);
        }

        function startListener() {
            if (unsubscribe) unsubscribe();
            if (!syncCode) return;

            unsubscribe = onSnapshot(doc(db, 'syncs', syncCode), (snap) => {
                if (!snap.exists()) return;
                const data = snap.data();
                if (data.updatedBy === deviceId) return; // ignore self
                if (snap.metadata.hasPendingWrites) return;
                applyRemoteData(data);
                updateStatus('synced');
            }, (err) => {
                console.error('Listener error:', err);
                updateStatus('error');
            });
        }

        function updateStatus(status) {
            const el = document.getElementById('syncStatus');
            const btn = document.getElementById('syncBtn');
            if (!el) return;
            const codeText = syncCode ? ' (' + syncCode + ')' : '';
            const map = {
                pending: {text: '⏳ Kaydediliyor...' + codeText, color: '#f59e0b'},
                synced: {text: '✓ Senkron' + codeText, color: '#22c55e'},
                error: {text: '⚠ Hata' + codeText, color: '#ef4444'},
                off: {text: 'Senkron aç', color: '#64748b'}
            };
            const s = map[status] || map.off;
            el.textContent = s.text;
            el.style.color = s.color;
            if (btn) {
                btn.style.borderColor = s.color;
                btn.style.color = s.color;
            }
        }

        async function createSyncCode() {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            syncCode = code;
            localStorage.setItem('sync_code', code);
            await upload();
            startListener();
            return code;
        }

        async function joinSyncCode(code) {
            if (!/^\d{6}$/.test(code)) throw new Error('Kod 6 haneli olmalı');
            const snap = await getDoc(doc(db, 'syncs', code));
            if (!snap.exists()) throw new Error('Kod bulunamadı');
            syncCode = code;
            localStorage.setItem('sync_code', code);
            applyRemoteData(snap.data());
            startListener();
            return true;
        }

        function disconnectSync() {
            if (unsubscribe) unsubscribe();
            unsubscribe = null;
            syncCode = null;
            localStorage.removeItem('sync_code');
            updateStatus('off');
        }

        // Initialize: anonymous auth, then start listener if code exists
        // Set initial status based on saved code (before auth completes)
        if (syncCode) {
            setTimeout(() => updateStatus('pending'), 0);
        } else {
            setTimeout(() => updateStatus('off'), 0);
        }

        signInAnonymously(auth).catch(err => console.error('Auth failed:', err));
        onAuthStateChanged(auth, (user) => {
            if (user && syncCode) {
                startListener();
                updateStatus('synced');
            } else if (!syncCode) {
                updateStatus('off');
            }
        });

        window.FirebaseSync = {
            scheduleUpload,
            createSyncCode,
            joinSyncCode,
            disconnectSync,
            getSyncCode: () => syncCode,
            isConnected: () => !!syncCode
        };
    </script>

    // Fetch sentences from free Dictionary API
    // Translate English text to Turkish via MyMemory API
    async function translateToTurkish(text) {
        try {
            const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|tr`);
            if (!resp.ok) return '';
            const data = await resp.json();
            if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
                return data.responseData.translatedText;
            }
            return '';
        } catch (err) {
            return '';
        }
    }

    async function fetchWordDetails(word) {
        if (sentenceCache[word] && sentenceCache[word].sentences && sentenceCache[word].sentences.length > 0) {
            // Check if cached sentences already have Turkish translations
            if (sentenceCache[word].sentences[0].tr) {
                return sentenceCache[word];
            }
        }

        try {
            const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
            if (!resp.ok) {
                return await generateFallbackSentences(word);
            }
            const data = await resp.json();
            const entry = data[0];

            // Extract phonetic
            let phonetic = '';
            if (entry.phonetic) phonetic = entry.phonetic;
            else if (entry.phonetics) {
                for (const p of entry.phonetics) {
                    if (p.text) { phonetic = p.text; break; }
                }
            }

            // Extract example sentences and definitions
            const sentences = [];
            let wordType = '';

            for (const meaning of (entry.meanings || [])) {
                if (!wordType) wordType = meaning.partOfSpeech || '';
                for (const def of (meaning.definitions || [])) {
                    if (def.example) {
                        sentences.push({ en: def.example, def: def.definition });
                    }
                }
            }

            if (sentences.length === 0) {
                return await generateFallbackSentences(word);
            }

            // Translate sentences to Turkish
            const picked = sentences.slice(0, 2);
            for (const s of picked) {
                s.tr = await translateToTurkish(s.en);
            }

            const result = {
                phonetic,
                wordType,
                sentences: picked,
                fetched: true
            };

            sentenceCache[word] = result;
            saveSentenceCache();
            // Auto-assign category from API
            if (wordType && !wordCategories[word]) {
                const cat = posToCategory(wordType);
                if (cat) { wordCategories[word] = cat; saveWordCategories(); }
            }
            return result;
        } catch (err) {
            console.warn('API fetch failed for:', word, err);
            return await generateFallbackSentences(word);
        }
    }

    async function generateFallbackSentences(word) {
        // No API example found - just show the word meaning, no fake sentences
        const result = {
            phonetic: '',
            wordType: '',
            sentences: [],
            fetched: false
        };
        sentenceCache[word] = result;
        saveSentenceCache();
        return result;
    }

    function getLevelInfo(xp) {
        let current = LEVELS[0];
        let next = LEVELS[1];
        for (let i = 0; i < LEVELS.length; i++) {
            if (xp >= LEVELS[i].min) {
                current = LEVELS[i];
                next = LEVELS[i + 1] || null;
            } else break;
        }
        const curMin = current.min;
        const nextMin = next ? next.min : curMin + 1000;
        const progress = next ? (xp - curMin) / (nextMin - curMin) : 1;
        return { current, next, progress: Math.min(1, progress), xpInLevel: xp - curMin, xpToNext: next ? nextMin - xp : 0 };
    }

    // ==================== DAILY WORD SELECTION (Spaced Repetition) ====================
    function getTodayStr() {
        return new Date().toISOString().split('T')[0];
    }

    function selectDailyWords() {
        const today = getTodayStr();
        const allWords = getAllWords();

        if (state.todayDate === today && state.todayWords.length > 0) {
            const valid = state.todayWords.every(key => allWords.some(w => w.en === key));
            if (valid) return state.todayWords;
        }
        // Force re-select if switching from old 10-word system
        state.todayWords = [];

        // Leitner Spaced Repetition: Box 1=her gun, Box 2=2 gunde bir, Box 3=4 gunde bir, Box 4=7 gunde bir, Box 5=14 gunde bir
        const BOX_INTERVALS = { 1: 1, 2: 2, 3: 4, 4: 7, 5: 14 };
        const seenWords = [];
        const unseenWords = [];
        const originalSet = new Set(ORIGINAL_WORDS.map(w => w.en));

        for (const w of allWords) {
            const stats = state.wordStats[w.en];
            const hasStats = stats && (stats.correct + stats.wrong) > 0;
            const isOriginal = originalSet.has(w.en);

            if (hasStats || isOriginal) {
                const box = (hasStats && stats.box) ? stats.box : 1;
                const interval = BOX_INTERVALS[box] || 1;
                const daysSince = (hasStats && stats.lastSeen) ? Math.floor((Date.now() - new Date(stats.lastSeen).getTime()) / 86400000) : 999;
                const isDue = daysSince >= interval;
                const total = hasStats ? (stats.correct + stats.wrong) : 0;
                const ratio = total === 0 ? 0.5 : stats.correct / total;
                // Lower priority = more urgent to review
                const priority = isDue ? (box - 6 + ratio * 2) : (box + 10);
                seenWords.push({ key: w.en, priority, isDue, box });
            } else {
                unseenWords.push({ key: w.en });
            }
        }

        // Due words first (sorted by priority), then non-due
        seenWords.sort((a, b) => a.priority - b.priority);
        shuffleArray(unseenWords);

        // Daily: 3 review + 2 new = 5 words
        const DAILY_COUNT = 5;
        const REVIEW_TARGET = 3;
        const NEW_TARGET = 2;

        // Pick due words first for review
        const dueWords = seenWords.filter(w => w.isDue);
        const reviewCount = Math.min(REVIEW_TARGET, dueWords.length);
        const newCount = Math.min(NEW_TARGET, unseenWords.length);
        const fillCount = DAILY_COUNT - reviewCount - newCount;

        const reviewCandidates = dueWords.slice(0, reviewCount * 2);
        shuffleArray(reviewCandidates);
        const reviewPick = reviewCandidates.slice(0, reviewCount).map(c => c.key);

        const newPick = unseenWords.slice(0, newCount + fillCount).map(c => c.key);

        // If we still need more from seen words
        let extraFromSeen = [];
        if (reviewPick.length + newPick.length < DAILY_COUNT && seenWords.length > reviewCount) {
            const remaining = seenWords.filter(s => !reviewPick.includes(s.key));
            shuffleArray(remaining);
            extraFromSeen = remaining.slice(0, DAILY_COUNT - reviewPick.length - newPick.length).map(c => c.key);
        }

        const selected = [...reviewPick, ...newPick, ...extraFromSeen].slice(0, DAILY_COUNT);
        shuffleArray(selected);

        state.todayWords = selected;
        state.todayDate = today;
        state.completedStages = {};
        quizAnswers3a = {};
        quizAnswers3b = {};

        // Update streak
        if (state.lastPracticeDate) {
            const lastDate = new Date(state.lastPracticeDate);
            const now = new Date();
            const diffDays = Math.floor((now - lastDate) / 86400000);
            if (diffDays > 1) state.streak = 0;
        }

        saveState();
        return selected;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function getTodayWords() {
        const keys = selectDailyWords();
        const allWords = getAllWords();
        return keys.map(key => allWords.find(w => w.en === key)).filter(Boolean);
    }

    function updateStats() {
        const allWords = getAllWords();
        document.getElementById('streakCount').textContent = state.streak;
        document.getElementById('totalWords').textContent = allWords.length;

        const todayCompleted = Object.keys(state.completedStages).length;
        document.getElementById('todayScore').textContent = todayCompleted > 0 ? todayCompleted + '/6' : '-';

        let mastered = 0;
        for (const w of allWords) {
            const s = state.wordStats[w.en];
            if (s && s.streak >= 5) mastered++;
        }
        document.getElementById('masteredCount').textContent = mastered;

    async function checkGrammar(text) {
        try {
            const resp = await fetch('https://api.languagetool.org/v2/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `text=${encodeURIComponent(text)}&language=en-US`
            });
            if (!resp.ok) return [];
            const data = await resp.json();
            return (data.matches || []).map(m => ({
                message: m.message,
                offset: m.offset,
                length: m.length,
                replacements: (m.replacements || []).slice(0, 3).map(r => r.value),
                context: m.context ? m.context.text : ''
            }));
        } catch (err) {
            return [];
        }
    }

    async function checkAllWritings() {
        for (let i = 0; i < writingWordsForCheck.length; i++) {
            const w = writingWordsForCheck[i];
            const textarea = document.getElementById(`writing_${i}`);
            const feedbackDiv = document.getElementById(`writingFeedback_${i}`);
            const text = textarea.value.trim();

            if (!text) {
                feedbackDiv.innerHTML = '<div style="color:#ef4444; font-size:14px;">Cümle yazmadın!</div>';
                continue;
            }

            let issues = [];
            let good = [];

            // 1. Check if word is used
            const wordRegex = new RegExp(w.en, 'i');
            if (wordRegex.test(text)) {
                good.push('Kelimeyi kullandın');
            } else {
                issues.push(`"<strong>${w.en}</strong>" kelimesini cümlede kullanmadın`);
            }

            // 2. Check minimum length
            const wordCount = text.split(/\s+/).length;
            if (wordCount >= 4) {
                good.push(`${wordCount} kelimelik cümle`);
            } else {
                issues.push('Cümle çok kısa (en az 4 kelime olmalı)');
            }

            // 3. Check starts with capital, ends with punctuation
            if (/^[A-Z]/.test(text)) {
                good.push('Büyük harfle başlıyor');
            } else {
                issues.push('Cümle büyük harfle başlamalı');
            }

            if (/[.!?]$/.test(text)) {
                good.push('Noktalama işareti var');
            } else {
                issues.push('Cümle sonuna nokta/soru/ünlem işareti koy');
            }

            // 4. Grammar check via LanguageTool API
            feedbackDiv.innerHTML = '<div style="color:#94a3b8; font-size:13px;">Gramer kontrol ediliyor...</div>';
            const grammarErrors = await checkGrammar(text);

            if (grammarErrors.length === 0) {
                good.push('Gramer hatası yok');
            } else {
                for (const err of grammarErrors) {
                    let msg = err.message;
                    if (err.replacements.length > 0) {
                        msg += ` → <strong>${err.replacements.join(', ')}</strong>`;
                    }
                    issues.push(msg);
                }
            }

            // 5. Show example sentence for comparison
            let exampleHtml = '';
            if (w.sentences && w.sentences.length > 0) {
                const ex = w.sentences[0];
                const exEn = ex.en.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#38bdf8;">$1</strong>');
                exampleHtml = `
                    <div style="background:#0f172a; padding:10px 14px; border-radius:8px; margin-top:8px; border-left:3px solid #38bdf8;">
                        <div style="color:#64748b; font-size:11px; margin-bottom:4px;">ÖRNEK CÜMLE:</div>
                        <div style="font-size:14px;">${exEn}</div>
                        ${ex.tr ? `<div style="color:#94a3b8; font-size:13px;">${ex.tr}</div>` : ''}
                    </div>
                `;
            } else {
                // Try from cache
                const cached = sentenceCache[w.en];
                if (cached && cached.sentences && cached.sentences.length > 0) {
                    const ex = cached.sentences[0];
                    const regex = new RegExp(`(${w.en})`, 'gi');
                    const exEn = ex.en.replace(regex, '<strong style="color:#38bdf8;">$1</strong>');
                    exampleHtml = `
                        <div style="background:#0f172a; padding:10px 14px; border-radius:8px; margin-top:8px; border-left:3px solid #38bdf8;">
                            <div style="color:#64748b; font-size:11px; margin-bottom:4px;">ÖRNEK CÜMLE:</div>
                            <div style="font-size:14px;">${exEn}</div>
                            ${ex.tr ? `<div style="color:#94a3b8; font-size:13px;">${ex.tr}</div>` : ''}
                        </div>
                    `;
                }
            }

            // Render feedback
            const hasIssues = issues.length > 0;
            feedbackDiv.innerHTML = `
                ${good.length > 0 ? `<div style="color:#22c55e; font-size:13px; margin-bottom:4px;">${good.map(g => '&#10003; ' + g).join(' &nbsp;|&nbsp; ')}</div>` : ''}
                ${issues.length > 0 ? `<div style="color:#f59e0b; font-size:13px;">${issues.map(g => '&#9888; ' + g).join('<br>')}</div>` : ''}
                ${!hasIssues ? '<div style="color:#22c55e; font-size:15px; font-weight:bold; margin-top:4px;">Harika cümle!</div>' : ''}
                ${exampleHtml}
            `;

            textarea.style.borderColor = hasIssues ? '#f59e0b' : '#22c55e';
        }

        // Show finish button
        document.getElementById('writingFinalBtn').style.display = 'block';
    }

    // ==================== NOTEBOOK (Defterim) ====================
    let notebookTab = 'words'; // 'words', 'patterns', 'writings', 'stats'

    function renderNotebook(el) {
        const allWords = getAllWords();
        const originalSet = new Set(ORIGINAL_WORDS.map(w => w.en));

        // Collect studied words with full info
        const studied = [];
        let weakCount = 0, masteredCount = 0;
        for (const w of allWords) {
            const s = state.wordStats[w.en];
            const hasStats = s && (s.correct + s.wrong) > 0;
            const isOriginal = originalSet.has(w.en);
            if (hasStats || isOriginal) {
                const total = hasStats ? (s.correct + s.wrong) : 0;
                const ratio = total === 0 ? 0 : s.correct / total;
                studied.push({ ...w, correct: hasStats ? s.correct : 0, wrong: hasStats ? s.wrong : 0, streak: hasStats ? s.streak : 0, ratio, isOriginal, hasStats });
                if (hasStats && ratio < 0.5) weakCount++;
                if (hasStats && s.streak >= 5) masteredCount++;
            }
        }

        const tabs = [
            { key: 'words', label: `Kelimelerim (${studied.length})` },
            { key: 'patterns', label: `Kalıplarım (${learnedPatterns.length})` },
            { key: 'writings', label: 'Yazdıklarım' },
            { key: 'stats', label: 'İstatistik' }
        ];

        let contentHtml = '';

        if (notebookTab === 'words') {
            contentHtml = renderNotebookWords(studied);
        } else if (notebookTab === 'patterns') {
            contentHtml = renderNotebookPatterns();
        } else if (notebookTab === 'writings') {
            contentHtml = renderNotebookWritings();
        } else if (notebookTab === 'stats') {
            contentHtml = renderNotebookStats(studied, weakCount, masteredCount);
        }

        el.innerHTML = `
            <div class="stage-title">Defterim</div>
            <div class="stage-desc">Öğrendiğin kelimeler, kalıplar ve yazdığın cümleler — Obsidian tarzında.</div>
            <div class="tab-buttons" style="flex-wrap:wrap;">
                ${tabs.map(t => `<button class="tab-btn ${notebookTab === t.key ? 'active' : ''}" onclick="notebookTab='${t.key}'; renderNotebook(document.getElementById('contentArea'))">${t.label}</button>`).join('')}
            </div>
            ${contentHtml}
        `;
    }

    let nbWordSearch = '';
    let nbWordCategory = 'all';

    // ==================== WORD CATEGORIES (user-assigned) ====================
    const WORD_CATEGORIES_KEY = 'english_word_categories_v1';
    function loadWordCategories() {
        const saved = localStorage.getItem(WORD_CATEGORIES_KEY);
        return saved ? JSON.parse(saved) : {};
    }
    function saveWordCategories() {
        localStorage.setItem(WORD_CATEGORIES_KEY, JSON.stringify(wordCategories));
        if (window.FirebaseSync) window.FirebaseSync.scheduleUpload();
    }
    let wordCategories = loadWordCategories(); // { "commit": "fiil", "efficient": "sifat", ... }

    // Categorize original words
    const ORIGINAL_FIILLER = ['commit','update','implement','develop','maintain','deliver','resolve','analyze','verify','investigate','adjust','confirm','determine','collaborate','prepare','improve','prefer'];
    const ORIGINAL_SIFATLAR = ['efficient','flexible','necessary','urgent','available','appropriate','relevant','crucial','common','potential'];
    const ORIGINAL_ISIMLER = ['experience','opportunity','improvement','environment','solution','feedback','challenge','requirement','progress','schedule','success','resource','impact','constraint','conclusion','estimate','notice'];

    // Map English POS to Turkish category
    function posToCategory(pos) {
        if (!pos) return '';
        const p = pos.toLowerCase();
        if (p === 'verb') return 'fiil';
        if (p === 'noun') return 'isim';
        if (p === 'adjective') return 'sifat';
        if (p === 'adverb') return 'zarf';
        return 'diger';
    }

    // Auto-assign categories: original words + API cache
    function autoAssignCategories() {
        let changed = false;
        // Original words
        for (const en of ORIGINAL_FIILLER) { if (!wordCategories[en]) { wordCategories[en] = 'fiil'; changed = true; } }
        for (const en of ORIGINAL_SIFATLAR) { if (!wordCategories[en]) { wordCategories[en] = 'sifat'; changed = true; } }
        for (const en of ORIGINAL_ISIMLER) { if (!wordCategories[en]) { wordCategories[en] = 'isim'; changed = true; } }
        // From API cache
        for (const [word, data] of Object.entries(sentenceCache)) {
            if (!wordCategories[word] && data.wordType) {
                const cat = posToCategory(data.wordType);
                if (cat) { wordCategories[word] = cat; changed = true; }
            }
        }
        if (changed) saveWordCategories();
    }
    autoAssignCategories();

    function setWordCategory(word, cat) {
        if (cat === '') {
            delete wordCategories[word];
        } else {
            wordCategories[word] = cat;
        }
        saveWordCategories();
        renderNotebook(document.getElementById('contentArea'));
    }

    function cycleWordCategory(word) {
        const order = ['fiil', 'sifat', 'isim', 'zarf', 'diger', ''];
        const current = wordCategories[word] || '';
        const idx = order.indexOf(current);
        const next = order[(idx + 1) % order.length];
        setWordCategory(word, next);
    }

    const CATEGORY_LABELS = { fiil: 'Fiil', sifat: 'Sıfat', isim: 'İsim', zarf: 'Zarf', diger: 'Diğer' };
    const CATEGORY_COLORS = { fiil: '#38bdf8', sifat: '#f59e0b', isim: '#a78bfa', zarf: '#22c55e', diger: '#94a3b8' };

    function getWordSentences(w) {
        let exEn = '', exTr = '';
        if (w.sentences && w.sentences.length > 0) {
            const s = w.sentences[0];
            exEn = s.en.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#38bdf8;">$1</strong>');
            exTr = s.tr || '';
        } else {
            const cached = sentenceCache[w.en];
            if (cached && cached.sentences && cached.sentences.length > 0) {
                const s = cached.sentences[0];
                const regex = new RegExp('(' + w.en + ')', 'gi');
                exEn = s.en.replace(regex, '<strong style="color:#38bdf8;">$1</strong>');
                exTr = s.tr || '';
            }
        }
        return { exEn, exTr };
    }


    function renderNotebookWords(studied) {
        if (studied.length === 0) {
            return '<div style="color:#64748b; text-align:center; padding:30px;">Henüz çalışılan kelime yok.</div>';
        }

        // Count per user-assigned category
        const catCounts = { fiil: 0, sifat: 0, isim: 0, zarf: 0, diger: 0, uncat: 0 };
        for (const w of studied) {
            const cat = wordCategories[w.en];
            if (cat && catCounts[cat] !== undefined) catCounts[cat]++;
            else if (cat) catCounts[cat]++;
            else catCounts.uncat++;
        }

        // Apply category filter
        let filtered = studied;
        if (nbWordCategory === 'fiil') filtered = studied.filter(w => wordCategories[w.en] === 'fiil');
        else if (nbWordCategory === 'sifat') filtered = studied.filter(w => wordCategories[w.en] === 'sifat');
        else if (nbWordCategory === 'isim') filtered = studied.filter(w => wordCategories[w.en] === 'isim');
        else if (nbWordCategory === 'zarf') filtered = studied.filter(w => wordCategories[w.en] === 'zarf');
        else if (nbWordCategory === 'diger') filtered = studied.filter(w => wordCategories[w.en] === 'diger');
        else if (nbWordCategory === 'uncat') filtered = studied.filter(w => !wordCategories[w.en]);
        else if (nbWordCategory === 'weak') filtered = studied.filter(w => w.hasStats && w.ratio < 0.5);
        else if (nbWordCategory === 'mastered') filtered = studied.filter(w => w.hasStats && w.streak >= 5);

        // Apply search
        if (nbWordSearch) {
            const q = nbWordSearch.toLowerCase();
            filtered = filtered.filter(w => w.en.includes(q) || w.tr.toLowerCase().includes(q));
        }

        const categories = [
            { key: 'all', label: `Tümü (${studied.length})`, color: '#a78bfa' },
            { key: 'fiil', label: `Fiiller (${catCounts.fiil})`, color: '#38bdf8' },
            { key: 'sifat', label: `Sıfatlar (${catCounts.sifat})`, color: '#f59e0b' },
            { key: 'isim', label: `İsimler (${catCounts.isim})`, color: '#a78bfa' },
            { key: 'zarf', label: `Zarflar (${catCounts.zarf})`, color: '#22c55e' },
            { key: 'diger', label: `Diğer (${catCounts.diger})`, color: '#94a3b8' },
            { key: 'uncat', label: `Kategorisiz (${catCounts.uncat})`, color: '#64748b' },
            { key: 'weak', label: `Zayıflar (${studied.filter(w => w.hasStats && w.ratio < 0.5).length})`, color: '#ef4444' },
            { key: 'mastered', label: `Hakimler (${studied.filter(w => w.hasStats && w.streak >= 5).length})`, color: '#22c55e' }
        ];

        // Limit to 30 for performance
        const showing = filtered.slice(0, 30);

        const rows = showing.map(w => {
            const { exEn, exTr } = getWordSentences(w);
            const total = w.correct + w.wrong;
            const pct = total > 0 ? Math.round(w.correct / total * 100) : -1;
            const scoreColor = pct < 0 ? '#64748b' : pct >= 70 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';
            const scoreText = pct < 0 ? '—' : '%' + pct;
            const cat = wordCategories[w.en] || '';
            const catColor = CATEGORY_COLORS[cat] || '#64748b';
            const catLabel = CATEGORY_LABELS[cat] || '';

            return `<tr>
                <td class="word-en" style="white-space:nowrap;">${w.en}</td>
                <td class="word-pron" style="white-space:nowrap;">${w.pron || ''}</td>
                <td style="white-space:nowrap;">
                    ${cat ? `<span style="background:${catColor}22; color:${catColor}; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer;" onclick="cycleWordCategory('${w.en}')" title="Tıkla: değiştir">${catLabel}</span>` : `<span style="color:#475569; font-size:11px; cursor:pointer;" onclick="cycleWordCategory('${w.en}')" title="Tıkla: kategori ata">—</span>`}
                </td>
                <td>${w.tr}</td>
                <td style="font-size:13px; max-width:200px;">${exEn || '<span style="color:#475569;">—</span>'}</td>
                <td style="font-size:13px; color:#94a3b8; max-width:200px;">${exTr || '<span style="color:#475569;">—</span>'}</td>
                <td style="text-align:center;"><span style="color:${scoreColor}; font-weight:600;">${scoreText}</span></td>
            </tr>`;
        }).join('');

        return `
            <input type="text" class="add-form-input" id="nbSearchInput" placeholder="Kelime ara (İngilizce veya Türkçe)..." value="${nbWordSearch}"
                oninput="clearTimeout(window._nbSearchTimer); window._nbSearchTimer=setTimeout(()=>{nbWordSearch=this.value; renderNotebook(document.getElementById('contentArea'));},300);"
                style="margin-bottom:12px;">

            <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:15px;">
                ${categories.map(c => `
                    <button onclick="nbWordCategory='${c.key}'; renderNotebook(document.getElementById('contentArea'));"
                        style="padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; border:1px solid ${nbWordCategory === c.key ? c.color : '#334155'}; background:${nbWordCategory === c.key ? c.color : 'transparent'}; color:${nbWordCategory === c.key ? '#0f172a' : '#94a3b8'};">
                        ${c.label}
                    </button>
                `).join('')}
            </div>

            ${filtered.length === 0 ? '<div style="color:#64748b; text-align:center; padding:20px;">Bu filtreyle eşleşen kelime yok.</div>' : `
                <div style="color:#64748b; font-size:12px; margin-bottom:8px;">${showing.length}/${filtered.length} kelime gösteriliyor${filtered.length > 30 ? ' — arama ile daralt' : ''}</div>
                <div style="max-height:500px; overflow-y:auto; overflow-x:auto;">
                <table class="word-table">
                    <thead>
                        <tr><th>Kelime</th><th>Okunuş</th><th>Tür</th><th>Anlam</th><th>Örnek Cümle</th><th>Türkçe Çeviri</th><th>Skor</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                </div>
            `}
        `;
    }

    function renderNotebookPatterns() {
        const learnedSet = new Set(learnedPatterns);
        const learned = PATTERNS.filter(p => learnedSet.has(p.pattern));

        if (learned.length === 0) {
            return '<div style="color:#64748b; text-align:center; padding:30px;">Henüz öğrenilmiş kalıp yok. Kalıplar sayfasından "Öğrendim" butonuyla işaretle.</div>';
        }

        return `
            <div style="color:#94a3b8; font-size:14px; margin-bottom:15px;">
                ${learned.length} / ${PATTERNS.length} kalıp öğrenildi
            </div>
            <div style="overflow-x:auto; max-height:600px; overflow-y:auto;">
            <table class="word-table">
                <thead>
                    <tr><th>Kalıp</th><th>Anlamı</th><th>Örnek</th><th>Çeviri</th></tr>
                </thead>
                <tbody>
                    ${learned.map(p => `<tr>
                        <td style="color:#22c55e; font-weight:600;">${p.pattern}</td>
                        <td>${p.meaning}</td>
                        <td style="font-size:13px;">${p.example}</td>
                        <td style="font-size:13px; color:#94a3b8;">${p.exampleTr}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
            </div>
        `;
    }

    function renderNotebookWritings() {
        const writings = state.writings || [];
        if (writings.length === 0) {
            return '<div style="color:#64748b; text-align:center; padding:30px;">Henüz yazma pratiği yapmadın.</div>';
        }
        return `
            <div style="max-height:600px; overflow-y:auto;">
                ${writings.slice().reverse().map(entry => `
                    <div style="background:#0f172a; border-radius:8px; padding:14px; margin-bottom:10px;">
                        <div style="color:#38bdf8; font-size:13px; font-weight:600; margin-bottom:8px;">${entry.date}</div>
                        ${entry.texts.map(t => `<div style="font-size:14px; margin-bottom:6px; padding:8px 12px; border-left:3px solid #a78bfa; background:#1e293b; border-radius:0 6px 6px 0;">${t}</div>`).join('')}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderNotebookStats(studied, weakCount, masteredCount) {
        const allWords = getAllWords();
        const totalSessions = state.totalSessions || 0;
        const totalCorrect = Object.values(state.wordStats).reduce((sum, s) => sum + (s.correct || 0), 0);
        const totalWrong = Object.values(state.wordStats).reduce((sum, s) => sum + (s.wrong || 0), 0);
        const totalAnswers = totalCorrect + totalWrong;
        const overallPct = totalAnswers > 0 ? Math.round(totalCorrect / totalAnswers * 100) : 0;

        return `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#38bdf8;">${studied.length}</div>
                    <div style="color:#94a3b8; font-size:13px;">Çalışılan Kelime</div>
                </div>
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#94a3b8;">${allWords.length - studied.length}</div>
                    <div style="color:#94a3b8; font-size:13px;">Bekleyen Kelime</div>
                </div>
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#22c55e;">${masteredCount}</div>
                    <div style="color:#94a3b8; font-size:13px;">Hakim Olunan</div>
                </div>
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#ef4444;">${weakCount}</div>
                    <div style="color:#94a3b8; font-size:13px;">Zayıf Kelime</div>
                </div>
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#f59e0b;">${state.streak || 0}</div>
                    <div style="color:#94a3b8; font-size:13px;">Gün Serisi</div>
                </div>
                <div style="background:#0f172a; padding:18px; border-radius:10px; text-align:center;">
                    <div style="font-size:36px; font-weight:bold; color:#a78bfa;">${totalSessions}</div>
                    <div style="color:#94a3b8; font-size:13px;">Toplam Oturum</div>
                </div>
            </div>
            <div style="background:#0f172a; padding:18px; border-radius:10px;">
                <div style="color:#94a3b8; font-size:13px; margin-bottom:8px;">Genel Başarı Oranı</div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="font-size:42px; font-weight:bold; color:${overallPct >= 70 ? '#22c55e' : overallPct >= 40 ? '#f59e0b' : '#ef4444'};">%${overallPct}</div>
                    <div style="flex:1;">
                        <div style="background:#334155; border-radius:6px; height:10px; overflow:hidden;">
                            <div style="background:${overallPct >= 70 ? '#22c55e' : overallPct >= 40 ? '#f59e0b' : '#ef4444'}; height:100%; width:${overallPct}%;"></div>
                        </div>
                        <div style="color:#64748b; font-size:12px; margin-top:4px;">${totalCorrect} doğru / ${totalWrong} yanlış — toplam ${totalAnswers} cevap</div>
                    </div>
                </div>
            </div>
        `;
    }

    // ==================== LEARNED PATTERNS ====================
    const LEARNED_PATTERNS_KEY = 'english_learned_patterns_v1';

    function loadLearnedPatterns() {
        const saved = localStorage.getItem(LEARNED_PATTERNS_KEY);
        return saved ? JSON.parse(saved) : [];
    }

    function saveLearnedPatterns() {
        localStorage.setItem(LEARNED_PATTERNS_KEY, JSON.stringify(learnedPatterns));
        if (window.FirebaseSync) window.FirebaseSync.scheduleUpload();
    }

    let learnedPatterns = loadLearnedPatterns(); // array of pattern strings

    function toggleLearnedPattern(pattern) {
        const idx = learnedPatterns.indexOf(pattern);
        const wasLearned = idx >= 0;
        if (wasLearned) {
            learnedPatterns.splice(idx, 1); // geri al
            if (state.stats && state.stats.patternsLearned > 0) state.stats.patternsLearned--;
        } else {
            learnedPatterns.push(pattern); // öğrendim
            if (!state.stats) state.stats = { totalCorrect: 0, totalWrong: 0, patternsLearned: 0, speakingCorrect: 0, dictationCorrect: 0, perfectQuizzes: 0 };
            state.stats.patternsLearned++;
        }
        saveLearnedPatterns();
        saveState();
        if (!wasLearned) addXP(8, 'Kalip ogrenildi');
        renderPatterns(document.getElementById('contentArea'));
    }

    function selectPatternCategory(cat) {
        selectedPatternCategory = cat;
        renderPatterns(document.getElementById('contentArea'));
    }

    function onPatternSearchInput(val) {
        patternSearchQuery = val;
        // Debounce re-render
        clearTimeout(window._patternSearchTimer);
        window._patternSearchTimer = setTimeout(() => {
            renderPatterns(document.getElementById('contentArea'));
            // Re-focus the input and position caret at end
            const input = document.getElementById('patternSearchInput');
            if (input) {
                input.focus();
                const len = input.value.length;
                input.setSelectionRange(len, len);
            }
        }, 250);
    }

    function clearPatternSearch() {
        patternSearchQuery = '';
        renderPatterns(document.getElementById('contentArea'));
    }

    function renderPatterns(el) {
        if (!patternsLoaded) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">Kalıplar yükleniyor...</div>';
            setTimeout(() => renderPatterns(el), 500);
            return;
        }
        if (PATTERNS.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:#f87171;">Kalıplar yüklenemedi. Sayfayı yenile.</div>';
            return;
        }

        const learnedSet = new Set(learnedPatterns);
        let filtered = selectedPatternCategory === 'Tümü' ? PATTERNS : PATTERNS.filter(p => p.category === selectedPatternCategory);

        // Apply text search
        const q = patternSearchQuery.trim().toLowerCase();
        if (q) {
            filtered = filtered.filter(p =>
                p.pattern.toLowerCase().includes(q) ||
                p.meaning.toLowerCase().includes(q) ||
                (p.example || '').toLowerCase().includes(q) ||
                (p.exampleTr || '').toLowerCase().includes(q)
            );
        }

        const unlearned = filtered.filter(p => !learnedSet.has(p.pattern));
        const shuffled = [...unlearned];
        shuffleArray(shuffled);
        // If searching, show all matches (up to 50); otherwise random 5
        const daily = q ? unlearned.slice(0, 50) : shuffled.slice(0, 5);

        const catBtns = PATTERN_CATEGORIES.map(c => {
            const active = c === selectedPatternCategory;
            const count = c === 'Tümü' ? PATTERNS.length : PATTERNS.filter(p => p.category === c).length;
            return `<button onclick="selectPatternCategory('${c}')" style="padding:6px 12px;border-radius:20px;border:1px solid ${active ? '#a78bfa' : '#334155'};background:${active ? '#a78bfa' : 'transparent'};color:${active ? '#fff' : '#94a3b8'};font-size:12px;white-space:nowrap;cursor:pointer;">${c} (${count})</button>`;
        }).join('');

        el.innerHTML = `
            <div class="stage-title">Günlük Kalıplar</div>
            <div class="stage-desc">

    // ==================== HELPERS ====================
    function updateWordStat(word, isCorrect) {
        if (!state.wordStats[word]) {
            state.wordStats[word] = { correct: 0, wrong: 0, lastSeen: null, streak: 0, box: 1 };
        }
        const s = state.wordStats[word];
        if (s.box === undefined) s.box = 1;
        if (isCorrect) {
            s.correct++;
            s.streak++;
            // Leitner: promote to next box (max 5)
            s.box = Math.min(5, s.box + 1);
        } else {
            s.wrong++;
            s.streak = 0;
            // Leitner: demote back to box 1
            s.box = 1;
        }
        s.lastSeen = getTodayStr();

        // Daily stats tracking
        if (!state.dailyStats) state.dailyStats = {};
        const today = getTodayStr();
        if (!state.dailyStats[today]) state.dailyStats[today] = { correct: 0, wrong: 0, answers: 0 };
        state.dailyStats[today].answers++;
        if (isCorrect) state.dailyStats[today].correct++;
        else state.dailyStats[today].wrong++;

        // Aggregate stats for gamification
        if (!state.stats) state.stats = { totalCorrect: 0, totalWrong: 0, patternsLearned: 0, speakingCorrect: 0, dictationCorrect: 0, perfectQuizzes: 0 };
        if (isCorrect) state.stats.totalCorrect++;
        else state.stats.totalWrong++;

        saveState();
        if (isCorrect) addXP(5, 'Dogru cevap');
    }

    // Singleton recognition instance for mobile compatibility
    let activeRecognition = null;
    let micPermissionGranted = false;

    function similarity(a, b) {
        if (a === b) return 1;
        const len = Math.max(a.length, b.length);
        if (len === 0) return 1;
        const matrix = [];
        for (let i = 0; i <= a.length; i++) { matrix[i] = [i]; }
        for (let j = 0; j <= b.length; j++) { matrix[0][j] = j; }
        for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
                const cost = a[i-1] === b[j-1] ? 0 : 1;
                matrix[i][j] = Math.min(matrix[i-1][j] + 1, matrix[i][j-1] + 1, matrix[i-1][j-1] + cost);
            }
        }
        return 1 - matrix[a.length][b.length] / len;
    }

    async function startListening(expectedWord) {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            document.getElementById('speakResult').innerHTML = '<span style="color:#f87171;">Bu tarayici ses tanima desteklemiyor. Chrome kullan.</span>';
            return;
        }

        // Check microphone permission (only ask once)
        if (!micPermissionGranted) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                micPermissionGranted = true;
            } catch (e) {
                document.getElementById('speakResult').innerHTML = '<span style="color:#f87171;">Mikrofon izni gerekli. Tarayici ayarlarindan mikrofon iznini ver.</span>';
                return;
            }
        }

        // Stop any active recognition
        if (activeRecognition) {
            try { activeRecognition.abort(); } catch(e) {}
            activeRecognition = null;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        activeRecognition = recognition;
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.maxAlternatives = 5;
        recognition.continuous = false;

        const micBtn = document.getElementById('micBtn');
        micBtn.classList.add('recording');
        micBtn.innerHTML = '&#9899;';

        const resultEl = document.getElementById('speakResult');
        resultEl.innerHTML = '<span style="color:#94a3b8;">Dinliyorum... Simdi konusabilirsin</span>';

        let gotResult = false;

        recognition.onresult = (event) => {
            // Get the latest result
            const lastResult = event.results[event.results.length - 1];

            // Show interim results as feedback
            if (!lastResult.isFinal) {
                const interim = lastResult[0].transcript;
                resultEl.innerHTML = `<span style="color:#94a3b8;">Duyulan: "${interim}"...</span>`;
                return;
            }

            gotResult = true;
            micBtn.classList.remove('recording');
            micBtn.innerHTML = '&#127908;';
            activeRecognition = null;

            const results = [];
            for (let i = 0; i < lastResult.length; i++) {
                results.push(lastResult[i].transcript.toLowerCase().trim());
            }
            const heard = results[0];
            const expected = expectedWord.toLowerCase().trim();

            const isMatch = results.some(r =>
                r === expected ||
                r.includes(expected) ||
                expected.includes(r) ||
                similarity(r, expected) >= 0.65
            );

            const bestSim = Math.max(...results.map(r => similarity(r, expected)));
            const pct = Math.round(bestSim * 100);

            if (isMatch) {
                micBtn.classList.add('success');
                resultEl.innerHTML = `
                    <div class="speaking-score good">${pct >= 90 ? 'Mukemmel!' : 'Dogru!'} %${pct}</div>
                    <div class="speaking-heard">Duyulan: "${heard}"</div>
                `;
                speakingState.results[speakingState.index] = true;
                if (!state.stats) state.stats = { totalCorrect: 0, totalWrong: 0, patternsLearned: 0, speakingCorrect: 0, dictationCorrect: 0, perfectQuizzes: 0 };
                state.stats.speakingCorrect++;
                saveState();
                addXP(10, 'Dogru telaffuz');
                setTimeout(() => speakingNext(), 1500);
            } else {
                resultEl.innerHTML = `
                    <div class="speaking-score bad">Tekrar dene (%${pct})</div>
                    <div class="speaking-heard">Duyulan: "${heard}" - Beklenen: "${expected}"</div>
                `;
                speakingState.results[speakingState.index] = false;
            }
        };

        recognition.onerror = (event) => {
            micBtn.classList.remove('recording');
            micBtn.innerHTML = '&#127908;';
            activeRecognition = null;
            if (event.error === 'no-speech') {
                resultEl.innerHTML = '<span style="color:#f59e0b;">Ses duyulmadi. Mikrofon butonuna basip tekrar dene.</span>';
            } else if (event.error === 'not-allowed') {
                resultEl.innerHTML = '<span style="color:#f87171;">Mikrofon izni reddedildi. Chrome ayarlarindan izin ver.</span>';
            } else if (event.error === 'network') {
                resultEl.innerHTML = '<span style="color:#f87171;">Internet baglantisi gerekli. Baglantini kontrol et.</span>';
            } else {
                resultEl.innerHTML = `<span style="color:#f87171;">Hata: ${event.error}. Tekrar dene.</span>`;
            }
        };

        recognition.onend = () => {
            if (!gotResult && activeRecognition === recognition) {
                micBtn.classList.remove('recording');
                micBtn.innerHTML = '&#127908;';
                activeRecognition = null;
                resultEl.innerHTML = '<span style="color:#f59e0b;">Ses algilanamadi. Mikrofona yakin konusup tekrar dene.</span>';
            }
        };

        try {
            recognition.start();
        } catch(e) {
            micBtn.classList.remove('recording');
            micBtn.innerHTML = '&#127908;';
            activeRecognition = null;
            resultEl.innerHTML = '<span style="color:#f87171;">Ses tanima baslatilamadi. Sayfayi yenileyip tekrar dene.</span>';
        }
    }

    function addExtraWords() {
        const allWords = getAllWords();
        const currentKeys = new Set(state.todayWords);
        const originalSet = new Set(ORIGINAL_WORDS.map(w => w.en));

        // Find 5 more words not already in today's list
        const candidates = allWords.filter(w => !currentKeys.has(w.en));
        const seenExtra = [];
        const unseenExtra = [];

        for (const w of candidates) {
            const stats = state.wordStats[w.en];
            const hasStats = stats && (stats.correct + stats.wrong) > 0;
            const isOriginal = originalSet.has(w.en);
            if (hasStats || isOriginal) {
                seenExtra.push(w.en);
            } else {
                unseenExtra.push(w.en);
            }
        }

        shuffleArray(seenExtra);
        shuffleArray(unseenExtra);

        const extra = [...seenExtra.slice(0, 3), ...unseenExtra.slice(0, 2)];
        if (extra.length === 0) {
            alert('Eklenecek kelime kalmadı!');
            return;
        }

        state.todayWords = [...state.todayWords, ...extra].slice(0, state.todayWords.length + 5);
        state.completedStages = {}; // Reset stages since word list changed
        saveState();

        // Refresh dashboard
        renderDashboard(document.getElementById('contentArea'));
        updateStats();
    }
