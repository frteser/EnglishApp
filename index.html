        const today = getTodayStr();
        // Prevent double streak increment on same day
        if (state.lastPracticeDate === today) {
            currentStage = 'results';
            renderResults(document.getElementById('contentArea'));
            return;
        }
        state.lastPracticeDate = today;
        state.streak++;
        state.totalSessions++;
        saveState();
        addXP(25, 'Gunluk pratik tamam');

        currentStage = 'results';
        renderResults(document.getElementById('contentArea'));
    }

    // ==================== ADD WORD ====================
    // ==================== FLASHCARD ====================
    let fcCards = [];
    let fcIndex = 0;
    let fcFlipped = false;
    let fcResults = { know: 0, dontknow: 0, skip: 0 };
    let fcAnswers = []; // per-card answer history: 'know','dontknow','skip' or undefined
    let fcMode = 'today'; // today, weak, all, mastered

    function getFlashcardWords(mode) {
        const allWords = getAllWords();
        switch(mode) {
            case 'today': return getTodayWords();
            case 'review': return getDueReviewWords();
            case 'new': {
                // Hic gorulmemis kelimeler (oncelikli) + en az gorulenler
                const unseen = allWords.filter(w => !state.wordStats[w.en] || (state.wordStats[w.en].correct + state.wordStats[w.en].wrong) === 0);
                if (unseen.length >= 10) {
                    return [...unseen].sort(() => Math.random() - 0.5).slice(0, 15);
                }
                // Yeterli yeni kelime yoksa, en az calisilanlardan tamamla
                const leastSeen = [...allWords]
                    .map(w => ({ w, total: state.wordStats[w.en] ? (state.wordStats[w.en].correct + state.wordStats[w.en].wrong) : 0 }))
                    .sort((a, b) => a.total - b.total)
                    .slice(0, 15)
                    .map(x => x.w);
                return [...new Set([...unseen, ...leastSeen])].slice(0, 15);
            }
            case 'weak': return allWords.filter(w => {
                const s = state.wordStats[w.en];
                return s && s.wrong > 0 && (!s.streak || s.streak < 3);
            });
            case 'mastered': return allWords.filter(w => {
                const s = state.wordStats[w.en];
                return s && s.streak >= 5;
            });
            case 'all': return [...allWords].sort(() => Math.random() - 0.5).slice(0, 30);
            default: return getTodayWords();
        }
    }

    // Leitner: tekrar zamani gelmis tum kelimeler
    function getDueReviewWords() {
        const BOX_INTERVALS = { 1: 1, 2: 2, 3: 4, 4: 7, 5: 14 };
        const allWords = getAllWords();
        const due = [];
        for (const w of allWords) {
            const s = state.wordStats[w.en];
            if (!s || (s.correct + s.wrong) === 0) continue;
            const box = s.box || 1;
            const interval = BOX_INTERVALS[box] || 1;
            const daysSince = s.lastSeen ? Math.floor((Date.now() - new Date(s.lastSeen).getTime()) / 86400000) : 999;
            if (daysSince >= interval) {
                due.push({ word: w, box, daysSince, priority: box - daysSince });
            }
        }
        // En acil tekrar gerekenler once (kucuk priority)
        due.sort((a, b) => a.priority - b.priority);
        return due.map(d => d.word);
    }

    function getDueReviewCount() {
        return getDueReviewWords().length;
    }

    function startFlashcards(mode) {
        fcMode = mode || fcMode;
        const words = getFlashcardWords(fcMode);
        fcCards = [...words].sort(() => Math.random() - 0.5);
        fcIndex = 0;
        fcFlipped = false;
        fcResults = { know: 0, dontknow: 0, skip: 0 };
        fcAnswers = [];
        renderFlashcard(document.getElementById('contentArea'));
    }

    // ==================== PERFORMANS DASHBOARD ====================
    function renderStats(el) {
        const allWords = getAllWords();
        const stats = state.wordStats || {};
        const dailyStats = state.dailyStats || {};

        // Genel istatistikler
        const totalWords = allWords.length;
        const seenWords = Object.keys(stats).length;
        const masteredWords = Object.values(stats).filter(s => (s.box || 1) >= 5).length;
        const weakWords = Object.values(stats).filter(s => s.wrong > s.correct && s.wrong >= 2).length;
        const totalCorrect = Object.values(stats).reduce((sum, s) => sum + (s.correct || 0), 0);
        const totalWrong = Object.values(stats).reduce((sum, s) => sum + (s.wrong || 0), 0);
        const totalAnswers = totalCorrect + totalWrong;
        const accuracy = totalAnswers > 0 ? Math.round((totalCorrect / totalAnswers) * 100) : 0;
        const learnedPatternsCount = (typeof learnedPatterns !== 'undefined') ? learnedPatterns.length : 0;
        const totalPatterns = (typeof PATTERNS !== 'undefined') ? PATTERNS.length : 0;
        const dueReviewCount = getDueReviewCount();

        // Son 7 gün verisi
        const today = new Date();
        const last7 = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key = d.toISOString().split('T')[0];
            const day = dailyStats[key] || { correct: 0, wrong: 0, answers: 0 };
            last7.push({
                date: key,
                label: ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'][(d.getDay() + 6) % 7],
                ...day
            });
        }
        const max7 = Math.max(1, ...last7.map(d => d.answers));

        // Leitner kutu dağılımı
        const boxes = [0, 0, 0, 0, 0];
        Object.values(stats).forEach(s => {
            const b = (s.box || 1) - 1;
            if (b >= 0 && b < 5) boxes[b]++;
        });
        const maxBox = Math.max(1, ...boxes);

        // En güçlü ve en zayıf kelimeler
        const wordEntries = Object.entries(stats).map(([w, s]) => ({ word: w, ...s }));
        const strongest = [...wordEntries].sort((a, b) => (b.streak || 0) - (a.streak || 0)).slice(0, 5);
        const weakest = [...wordEntries].filter(w => (w.wrong || 0) > 0).sort((a, b) => (b.wrong || 0) - (a.wrong || 0)).slice(0, 5);

        // SVG bar chart - 7 gün
        const barChart = `
            <svg viewBox="0 0 320 140" style="width:100%; height:auto;">
                ${last7.map((d, i) => {
                    const x = 15 + i * 42;
                    const h = (d.answers / max7) * 80;
                    const y = 100 - h;
                    const correctH = d.answers > 0 ? (d.correct / d.answers) * h : 0;
                    return `
                        <rect x="${x}" y="${y}" width="30" height="${h}" fill="#ef4444" rx="3"/>
                        <rect x="${x}" y="${100 - correctH}" width="30" height="${correctH}" fill="#22c55e" rx="3"/>
                        <text x="${x + 15}" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">${d.label}</text>
                        <text x="${x + 15}" y="${y - 4}" text-anchor="middle" fill="#e2e8f0" font-size="10">${d.answers || ''}</text>
                    `;
                }).join('')}
            </svg>
        `;

        // SVG bar chart - Leitner kutuları
        const boxChart = `
            <svg viewBox="0 0 320 140" style="width:100%; height:auto;">
                ${boxes.map((count, i) => {
                    const x = 25 + i * 58;
                    const h = (count / maxBox) * 80;
                    const y = 100 - h;
                    const colors = ['#ef4444', '#f59e0b', '#eab308', '#84cc16', '#22c55e'];
                    return `
                        <rect x="${x}" y="${y}" width="44" height="${h}" fill="${colors[i]}" rx="4"/>
                        <text x="${x + 22}" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">Kutu ${i+1}</text>
                        <text x="${x + 22}" y="${y - 4}" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">${count}</text>
                    `;
                }).join('')}
            </svg>
        `;

        el.innerHTML = `
            <div class="stage-title">Performans</div>
            <div class="stage-desc">İlerlemeni takip et</div>

            ${dueReviewCount > 0 ? `
            <div onclick="navigateStage('flashcard', null); setTimeout(() => startFlashcards('review'), 100);"
                style="background:linear-gradient(135deg, #06b6d4, #0891b2); border-radius:12px; padding:16px; margin:14px 0; cursor:pointer; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 12px rgba(6,182,212,0.3);">
                <div>
                    <div style="color:#fff; font-size:13px; opacity:0.9;">🔁 Tekrar Zamanı</div>
                    <div style="color:#fff; font-size:22px; font-weight:bold; margin-top:4px;">${dueReviewCount} kelime</div>
                    <div style="color:#fff; font-size:12px; opacity:0.85; margin-top:2px;">tekrar zamanı geldi — şimdi tekrar et</div>
                </div>
                <div style="color:#fff; font-size:32px;">→</div>
            </div>
            ` : ''}

            <!-- Üst stat kartları -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0;">
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #06b6d4;">
                    <div style="font-size:11px; color:#94a3b8;">Seri</div>
                    <div style="font-size:24px; font-weight:bold; color:#06b6d4;">${state.streak || 0} gün</div>
                </div>
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #22c55e;">
                    <div style="font-size:11px; color:#94a3b8;">Doğruluk</div>
                    <div style="font-size:24px; font-weight:bold; color:#22c55e;">%${accuracy}</div>
                </div>
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #a78bfa;">
                    <div style="font-size:11px; color:#94a3b8;">Görülen Kelime</div>
                    <div style="font-size:24px; font-weight:bold; color:#a78bfa;">${seenWords}/${totalWords}</div>
                </div>
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #f59e0b;">
                    <div style="font-size:11px; color:#94a3b8;">Ezberlenen</div>
                    <div style="font-size:24px; font-weight:bold; color:#f59e0b;">${masteredWords}</div>
                </div>
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #ec4899;">
                    <div style="font-size:11px; color:#94a3b8;">Toplam Cevap</div>
                    <div style="font-size:24px; font-weight:bold; color:#ec4899;">${totalAnswers}</div>
                </div>
                <div style="background:#1e293b; border-radius:12px; padding:14px; border-left:4px solid #14b8a6;">
                    <div style="font-size:11px; color:#94a3b8;">Öğrenilen Kalıp</div>
                    <div style="font-size:24px; font-weight:bold; color:#14b8a6;">${learnedPatternsCount}/${totalPatterns}</div>
                </div>
            </div>

            <!-- 7 günlük grafik -->
            <div style="background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px;">
                <div style="font-size:14px; color:#e2e8f0; margin-bottom:10px; font-weight:bold;">Son 7 Gün Aktivite</div>
                <div style="font-size:11px; color:#94a3b8; margin-bottom:8px;">
                    <span style="display:inline-block; width:10px; height:10px; background:#22c55e; border-radius:2px; vertical-align:middle;"></span> Doğru
                    <span style="display:inline-block; width:10px; height:10px; background:#ef4444; border-radius:2px; vertical-align:middle; margin-left:10px;"></span> Yanlış
                </div>
                ${barChart}
            </div>

            <!-- Leitner kutu dağılımı -->
            <div style="background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px;">
                <div style="font-size:14px; color:#e2e8f0; margin-bottom:6px; font-weight:bold;">Leitner Kutu Dağılımı</div>
                <div style="font-size:11px; color:#94a3b8; margin-bottom:8px;">Kutu 1 = öğreniliyor, Kutu 5 = ezberlenmiş</div>
                ${boxChart}
            </div>

            <!-- En güçlü kelimeler -->
            ${strongest.length > 0 ? `
                <div style="background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px;">
                    <div style="font-size:14px; color:#22c55e; margin-bottom:10px; font-weight:bold;">En Güçlü Kelimelerin</div>
                    ${strongest.map(w => `
                        <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #334155; font-size:13px;">
                            <span style="color:#e2e8f0;">${w.word}</span>
                            <span style="color:#22c55e;">🔥 ${w.streak || 0}</span>
                        </div>
                    `).join('')}
                </div>
            ` : ''}

            <!-- En zayıf kelimeler -->
            ${weakest.length > 0 ? `
                <div style="background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px;">
                    <div style="font-size:14px; color:#ef4444; margin-bottom:10px; font-weight:bold;">Daha Çok Pratik Lazım</div>
                    ${weakest.map(w => `
                        <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #334155; font-size:13px;">
                            <span style="color:#e2e8f0;">${w.word}</span>
                            <span style="color:#ef4444;">❌ ${w.wrong || 0}</span>
                        </div>
                    `).join('')}
                </div>
            ` : ''}

            ${seenWords === 0 ? `
                <div style="text-align:center; padding:30px; color:#94a3b8;">
                    <div style="font-size:48px; margin-bottom:12px;">📊</div>
                    <p>Henüz veri yok. Çalışmaya başla, istatistikler burada görünecek!</p>
                </div>
            ` : ''}
        `;
    }

    function renderFlashcard(el) {
        if (fcCards.length === 0) {
            const words = getFlashcardWords(fcMode);
            fcCards = [...words].sort(() => Math.random() - 0.5);
        }

        if (fcCards.length === 0) {
            el.innerHTML = `
                <div class="stage-title">Kelime Kartlari</div>
                <div class="fc-container">
                    <div style="text-align:center; color:#94a3b8; padding:40px 0;">
                        <div style="font-size:48px; margin-bottom:16px;">&#128195;</div>
                        <p>Bu modda gosterilecek kelime yok.</p>
                        <p style="font-size:13px; margin-top:8px;">Baska bir mod sec veya once ders calis!</p>
                    </div>
                    <div class="fc-mode-btns">
                        ${renderFcModeBtns()}
                    </div>
                </div>`;
            return;
        }

        if (fcIndex >= fcCards.length) {
            renderFlashcardResults(el);
            return;
        }

        const w = fcCards[fcIndex];
        const s = state.wordStats[w.en];
        const sentence = w.sentences && w.sentences[0] ? w.sentences[0].en : '';

        el.innerHTML = `
            <div class="stage-title">Kelime Kartlari</div>
            <div class="fc-container">
                <div class="fc-mode-btns">
                    ${renderFcModeBtns()}
                </div>
                <div class="fc-progress">${fcIndex + 1} / ${fcCards.length}</div>
                <div class="fc-card-wrapper" onclick="flipCard()">
                    <div class="fc-card ${fcFlipped ? 'flipped' : ''}" id="fcCard">
                        <div class="fc-card-face fc-front">
                            <div class="fc-word">${w.en}</div>
                            <div class="fc-pron">${w.pron || ''}</div>
                            <div class="fc-hint">Cevirmek icin dokun</div>
                        </div>
                        <div class="fc-card-face fc-back">
                            <div class="fc-meaning">${w.tr}</div>
                            ${sentence ? `<div class="fc-sentence">"${sentence}"</div>` : ''}
                        </div>
                    </div>
                </div>
                <div class="fc-actions">
                    <button class="fc-btn fc-btn-dontknow${fcAnswers[fcIndex] === 'dontknow' ? ' fc-btn-selected' : ''}" onclick="fcAnswer('dontknow')">Bilmiyorum</button>
                    <button class="fc-btn fc-btn-skip${fcAnswers[fcIndex] === 'skip' ? ' fc-btn-selected' : ''}" onclick="fcAnswer('skip')">Gec</button>
                    <button class="fc-btn fc-btn-know${fcAnswers[fcIndex] === 'know' ? ' fc-btn-selected' : ''}" onclick="fcAnswer('know')">Biliyorum</button>
                </div>
                <div style="display:flex; gap:12px; margin-top:12px; width:100%; max-width:340px;">
                    <button class="fc-btn fc-btn-skip" style="flex:1; padding:10px; font-size:13px;${fcIndex === 0 ? 'opacity:0.4;cursor:default;' : ''}" onclick="fcPrev()" ${fcIndex === 0 ? 'disabled' : ''}>&#8592; Geri</button>
                    <button class="fc-btn fc-btn-skip" style="flex:1; padding:10px; font-size:13px;" onclick="fcNext()">Ileri &#8594;</button>
                </div>
                <div class="fc-stats-bar">
                    <span><div class="fc-dot-green"></div> ${fcResults.know}</span>
                    <span><div class="fc-dot-red"></div> ${fcResults.dontknow}</span>
                    <span><div class="fc-dot-gray"></div> ${fcResults.skip}</span>
                </div>
            </div>`;
    }

    function renderFcModeBtns() {
        const dueCount = getDueReviewCount();
        const modes = [
            { key: 'today', label: 'Bugun' },
            { key: 'new', label: 'Yeni' },
            { key: 'review', label: `Tekrar${dueCount > 0 ? ' (' + dueCount + ')' : ''}` },
            { key: 'weak', label: 'Zayif' },
            { key: 'all', label: 'Karisik' },
            { key: 'mastered', label: 'Ogrenilen' }
        ];
        return modes.map(m =>
            `<button class="fc-mode-btn ${fcMode === m.key ? 'active' : ''}" onclick="startFlashcards('${m.key}')">${m.label}</button>`
        ).join('');
    }

    function fcPrev() {
        if (fcIndex > 0) {
            fcIndex--;
            fcFlipped = false;
            renderFlashcard(document.getElementById('contentArea'));
        }
    }

    function fcNext() {
        if (fcIndex < fcCards.length) {
            fcIndex++;
            fcFlipped = false;
            renderFlashcard(document.getElementById('contentArea'));
        }
    }

    function flipCard() {
        fcFlipped = !fcFlipped;
        const card = document.getElementById('fcCard');
        if (card) card.classList.toggle('flipped', fcFlipped);
    }

    function fcAnswer(type) {
        const w = fcCards[fcIndex];

        // Undo previous answer for this card if re-answering
        const prev = fcAnswers[fcIndex];
        if (prev) {
            fcResults[prev]--;
            // Undo wordStats
            if (prev === 'know' && state.wordStats[w.en]) {
                state.wordStats[w.en].correct--;
                state.wordStats[w.en].streak = Math.max(0, state.wordStats[w.en].streak - 1);
            } else if (prev === 'dontknow' && state.wordStats[w.en]) {
                state.wordStats[w.en].wrong--;
            }
        }

        fcAnswers[fcIndex] = type;
        fcResults[type]++;

        // Update wordStats
        if (type === 'know') {
            if (!state.wordStats[w.en]) state.wordStats[w.en] = { correct: 0, wrong: 0, streak: 0, lastSeen: null };
            state.wordStats[w.en].correct++;
            state.wordStats[w.en].streak++;
            state.wordStats[w.en].lastSeen = getTodayStr();
        } else if (type === 'dontknow') {
            if (!state.wordStats[w.en]) state.wordStats[w.en] = { correct: 0, wrong: 0, streak: 0, lastSeen: null };
            state.wordStats[w.en].wrong++;
            state.wordStats[w.en].streak = 0;
            state.wordStats[w.en].lastSeen = getTodayStr();
        }
        saveState();

        fcIndex++;
        fcFlipped = false;
        renderFlashcard(document.getElementById('contentArea'));
    }

    function renderFlashcardResults(el) {
        const total = fcResults.know + fcResults.dontknow + fcResults.skip;
        const pct = total > 0 ? Math.round((fcResults.know / total) * 100) : 0;

        el.innerHTML = `
            <div class="stage-title">Kelime Kartlari</div>
            <div class="fc-result">
                <div style="font-size:48px; margin-bottom:12px;">${pct >= 80 ? '&#127881;' : pct >= 50 ? '&#128170;' : '&#128218;'}</div>
                <h2>${pct >= 80 ? 'Harika!' : pct >= 50 ? 'Iyi gidiyorsun!' : 'Pratik yapmaya devam!'}</h2>
                <div class="fc-result-stats">
                    <div class="fc-result-stat">
                        <div class="num" style="color:#22c55e">${fcResults.know}</div>
                        <div class="label">Biliyorum</div>
                    </div>
                    <div class="fc-result-stat">
                        <div class="num" style="color:#ef4444">${fcResults.dontknow}</div>
                        <div class="label">Bilmiyorum</div>
                    </div>
                    <div class="fc-result-stat">
                        <div class="num" style="color:#64748b">${fcResults.skip}</div>
                        <div class="label">Gecilen</div>
                    </div>
                </div>
                <p style="color:#94a3b8; margin-bottom:20px;">Basari: %${pct}</p>
                <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="startFlashcards('new')" style="background:#22c55e;">Yeni Kelimeler Getir</button>
                    <button class="btn btn-secondary" onclick="startFlashcards('${fcMode}')">Tekrar Oyna</button>
                    ${fcResults.dontknow > 0 ? `<button class="btn btn-secondary" onclick="replayWrong()">Yanlislari Tekrarla</button>` : ''}
                </div>
                <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:14px;">
                    ${fcMode !== 'today' ? `<button class="fc-mode-btn" onclick="startFlashcards('today')">Bugun</button>` : ''}
                    ${fcMode !== 'review' ? `<button class="fc-mode-btn" onclick="startFlashcards('review')">Tekrar</button>` : ''}
                    ${fcMode !== 'weak' ? `<button class="fc-mode-btn" onclick="startFlashcards('weak')">Zayif</button>` : ''}
                    ${fcMode !== 'all' ? `<button class="fc-mode-btn" onclick="startFlashcards('all')">Karisik</button>` : ''}
                </div>
            </div>`;
    }

    function replayWrong() {
        const wrongWords = fcCards.filter((w, i) => {
            // find words that were answered dontknow - we track by checking stats changed
            const s = state.wordStats[w.en];
            return s && s.wrong > 0 && s.streak === 0;
        });
        if (wrongWords.length > 0) {
            fcCards = [...wrongWords].sort(() => Math.random() - 0.5);
        }
        fcIndex = 0;
        fcFlipped = false;
        fcResults = { know: 0, dontknow: 0, skip: 0 };
        renderFlashcard(document.getElementById('contentArea'));
    }

    let addWordTab = 'add';
    let sentenceCount = 1;

    function renderAddWord(el) {
        const allWords = getAllWords();
        el.innerHTML = `
            <div class="stage-title">Kelime Yönetimi</div>
            <div class="stage-desc">Yeni kelime ekle veya mevcut kelimeleri gör.</div>

            <div class="tab-buttons">
                <button class="tab-btn ${addWordTab === 'add' ? 'active' : ''}" onclick="addWordTab='add'; renderAddWord(document.getElementById('contentArea'))">Yeni Kelime Ekle</button>
                <button class="tab-btn ${addWordTab === 'list' ? 'active' : ''}" onclick="addWordTab='list'; renderAddWord(document.getElementById('contentArea'))">Tüm Kelimeler (${allWords.length})</button>
            </div>

            <div class="success-msg" id="addSuccessMsg">Kelime başarıyla eklendi!</div>

            ${addWordTab === 'add' ? renderAddForm() : renderWordList()}
        `;
    }

    function renderAddForm() {
        sentenceCount = 1;
        return `
            <form id="addWordForm" onsubmit="return handleAddWord(event)">
                <div class="add-form-row">
                    <div class="add-form-group">
                        <label>İngilizce Kelime</label>
                        <input type="text" class="add-form-input" id="newWordEn" placeholder="örn: accomplish" required>
                    </div>
                    <div class="add-form-group">
                        <label>Okunuş</label>
                        <input type="text" class="add-form-input" id="newWordPron" placeholder="örn: Ekamplış">
                    </div>
                </div>

                <div class="add-form-group">
                    <label>Türkçe Anlamı</label>
                    <input type="text" class="add-form-input" id="newWordTr" placeholder="örn: Başarmak, tamamlamak" required>
                </div>

                <div class="btn-center">
                    <button type="submit" class="btn btn-success">Kelimeyi Kaydet</button>
                </div>
                <p style="color:#64748b; font-size:12px; text-align:center; margin-top:10px;">
                    Örnek cümleler API'den otomatik çekilecek.
                </p>
            </form>
        `;
    }

    function handleAddWord(e) {
        e.preventDefault();
        const en = document.getElementById('newWordEn').value.trim().toLowerCase();
        const pron = document.getElementById('newWordPron').value.trim() || '';
        const tr = document.getElementById('newWordTr').value.trim();

        // Check duplicate
        const allWords = getAllWords();
        if (allWords.some(w => w.en.toLowerCase() === en)) {
            alert('Bu kelime zaten mevcut!');
            return false;
        }

        const newWord = { en, pron, tr, custom: true, addedDate: getTodayStr() };
        customWords.push(newWord);
        saveCustomWords();

        // Reset today's words so new word can appear
        state.todayDate = null;
        state.todayWords = [];
        saveState();
        selectDailyWords();

        // Show success
        const msg = document.getElementById('addSuccessMsg');
        msg.classList.add('show');
        msg.textContent = `"${en}" başarıyla eklendi! Toplam: ${getAllWords().length} kelime`;
        setTimeout(() => msg.classList.remove('show'), 3000);

        // Re-render form
        const formArea = document.getElementById('addWordForm');
        formArea.outerHTML = renderAddForm();
        updateStats();
        return false;
    }

    let wordListSearch = '';

    function renderWordList() {
        const allWords = getAllWords();
        const customCount = customWords.length;

        // Filter by search
        const filtered = wordListSearch
            ? allWords.filter(w => w.en.includes(wordListSearch.toLowerCase()) || w.tr.toLowerCase().includes(wordListSearch.toLowerCase()))
            : allWords;

        // Show max 50 at a time
        const showing = filtered.slice(0, 50);

        return `
            <div style="margin-bottom:15px; color:#94a3b8; font-size:14px;">
                ${allWords.length} toplam kelime ${customCount > 0 ? `(${customCount} eklenen)` : ''}
            </div>
            <input type="text" class="add-form-input" placeholder="Kelime ara (İngilizce veya Türkçe)..." value="${wordListSearch}"
                oninput="wordListSearch=this.value; document.getElementById('wordListContainer').innerHTML = buildWordItems();"
                style="margin-bottom:15px;">
            <div id="wordListContainer" style="max-height:450px; overflow-y:auto;">
                ${buildWordItemsFrom(showing)}
            </div>
            ${filtered.length > 50 ? `<div style="color:#64748b; font-size:13px; text-align:center; margin-top:10px;">İlk 50 gösteriliyor (toplam ${filtered.length}). Arama yaparak daraltın.</div>` : ''}
        `;
    }

    function buildWordItems() {
        const allWords = getAllWords();
        const filtered = wordListSearch
            ? allWords.filter(w => w.en.includes(wordListSearch.toLowerCase()) || w.tr.toLowerCase().includes(wordListSearch.toLowerCase()))
            : allWords;
        return buildWordItemsFrom(filtered.slice(0, 50));
    }

    function buildWordItemsFrom(list) {
        return list.map(w => `
            <div class="word-list-item">
                <div class="word-info">
                    <span class="word-name">${w.en}</span>
                    ${w.custom ? '<span class="word-badge" style="background:#052e16; color:#4ade80;">eklenen</span>' : ''}
                    <div class="word-meaning">${w.tr} ${w.pron ? '— ' + w.pron : ''}</div>
                </div>
                ${w.custom ? `<button class="delete-word-btn" onclick="deleteCustomWord('${w.en}')">Sil</button>` : ''}
            </div>
        `).join('');
    }

    function deleteCustomWord(en) {
        if (!confirm(`"${en}" kelimesini silmek istediğinize emin misiniz?`)) return;
        customWords = customWords.filter(w => w.en !== en);
        saveCustomWords();
        state.todayDate = null;
        state.todayWords = [];
        saveState();
        selectDailyWords();
        renderAddWord(document.getElementById('contentArea'));
        updateStats();
    }

    // ==================== PWA & NOTIFICATIONS ====================
    let deferredInstallPrompt = null;

    // PWA Install
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredInstallPrompt = e;
        const dismissed = localStorage.getItem('pwa_banner_dismissed');
        if (!dismissed) {
            document.getElementById('pwaBanner').classList.add('show');
        }
    });

    function installPWA() {
        if (!deferredInstallPrompt) {
            alert('Tarayicinin menusunden "Ana ekrana ekle" secenegini kullanabilirsin.');
            return;
        }
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.then(result => {
            if (result.outcome === 'accepted') {
                document.getElementById('pwaBanner').classList.remove('show');
            }
            deferredInstallPrompt = null;
        });
    }

    function dismissPWA() {
        document.getElementById('pwaBanner').classList.remove('show');
        localStorage.setItem('pwa_banner_dismissed', '1');
    }

    window.addEventListener('appinstalled', () => {
        document.getElementById('pwaBanner').classList.remove('show');
        deferredInstallPrompt = null;
    });

    // ==================== ALARM SYSTEM ====================
    const DAY_NAMES = ['Pzt', 'Sal', 'Car', 'Per', 'Cum', 'Cmt', 'Paz'];

    function getAlarms() {
        // Migrate from old single-alarm system
        if (localStorage.getItem('notif_enabled') === '1' && !localStorage.getItem('alarms')) {
            const oldTime = localStorage.getItem('notif_time') || '09:00';
            const migrated = [{ id: Date.now(), time: oldTime, days: [0,1,2,3,4,5,6], enabled: true }];
            localStorage.setItem('alarms', JSON.stringify(migrated));
            localStorage.removeItem('notif_enabled');
            localStorage.removeItem('notif_time');
        }
        return JSON.parse(localStorage.getItem('alarms') || '[]');
    }

    function saveAlarms(alarms) {
        localStorage.setItem('alarms', JSON.stringify(alarms));
        scheduleAllAlarms();
        if (window.FirebaseSync) window.FirebaseSync.scheduleUpload();
    }

    function renderAlarmList() {
        const alarms = getAlarms();
        if (alarms.length === 0) {
            return '<div style="text-align:center; color:#64748b; font-size:13px; padding:12px;">Henuz alarm yok. Ekle butonuna bas!</div>';
        }
        return alarms.map(a => {
            const dayBadges = DAY_NAMES.map((d, i) =>
                `<span class="alarm-day-badge ${a.days.includes(i) ? 'active' : ''}">${d}</span>`
            ).join('');
            const dayLabel = getDayLabel(a.days);
            return `
            <div class="alarm-card">
                <div class="alarm-card-left" onclick="openAlarmEditor(${a.id})" style="cursor:pointer">
                    <div class="alarm-time-display">${a.time}</div>
                    <div class="alarm-days">${dayBadges}</div>
                    <div style="font-size:11px; color:#64748b; margin-top:2px;">${dayLabel}</div>
                </div>
                <div class="alarm-card-actions">
                    <div class="toggle-switch ${a.enabled ? 'active' : ''}" onclick="toggleAlarm(${a.id})"></div>
                    <button class="alarm-delete-btn" onclick="deleteAlarm(${a.id})">&times;</button>
                </div>
            </div>`;
        }).join('');
    }

    function getDayLabel(days) {
        const sorted = [...days].sort();
        if (sorted.length === 7) return 'Her gun';
        if (sorted.length === 5 && sorted.join() === '0,1,2,3,4') return 'Hafta ici';
        if (sorted.length === 2 && sorted.join() === '5,6') return 'Hafta sonu';
        return sorted.map(d => DAY_NAMES[d]).join(', ');
    }

    function openAlarmEditor(editId) {
        const alarms = getAlarms();
        const existing = editId ? alarms.find(a => a.id === editId) : null;
        const currentTime = existing ? existing.time : '09:00';
        const currentDays = existing ? existing.days : [0,1,2,3,4];

        const modal = document.createElement('div');
        modal.className = 'alarm-edit-modal';
        modal.id = 'alarmEditModal';
        modal.innerHTML = `
        <div class="alarm-edit-box">
            <h3>${existing ? 'Alarmi Duzenle' : 'Yeni Alarm'}</h3>
            <input type="time" id="alarmEditTime" value="${currentTime}">
            <div class="alarm-day-selector" id="alarmDaySelector">
                ${DAY_NAMES.map((d, i) =>
                    `<button class="alarm-day-btn ${currentDays.includes(i) ? 'selected' : ''}" data-day="${i}" onclick="this.classList.toggle('selected')">${d}</button>`
                ).join('')}
            </div>
            <div class="alarm-preset-btns">
                <button class="alarm-preset-btn" onclick="selectAlarmPreset('weekdays')">Hafta ici</button>
                <button class="alarm-preset-btn" onclick="selectAlarmPreset('weekends')">Hafta sonu</button>
                <button class="alarm-preset-btn" onclick="selectAlarmPreset('everyday')">Her gun</button>
            </div>
            <div class="alarm-edit-actions">
                <button class="alarm-cancel-btn" onclick="closeAlarmEditor()">Vazgec</button>
                <button class="alarm-save-btn" onclick="saveAlarmFromEditor(${editId || 0})">Kaydet</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeAlarmEditor(); });
    }

    function selectAlarmPreset(preset) {
        const btns = document.querySelectorAll('#alarmDaySelector .alarm-day-btn');
        btns.forEach(btn => {
            const day = parseInt(btn.dataset.day);
            if (preset === 'weekdays') btn.classList.toggle('selected', day <= 4);
            else if (preset === 'weekends') btn.classList.toggle('selected', day >= 5);
            else if (preset === 'everyday') btn.classList.add('selected');
        });
    }

    function closeAlarmEditor() {
        const modal = document.getElementById('alarmEditModal');
        if (modal) modal.remove();
    }

    async function saveAlarmFromEditor(editId) {
        const time = document.getElementById('alarmEditTime').value;
        const selectedDays = [...document.querySelectorAll('#alarmDaySelector .alarm-day-btn.selected')]
            .map(btn => parseInt(btn.dataset.day));

        if (selectedDays.length === 0) {
            alert('En az bir gun secmelisin!');
            return;
        }

        // Request notification permission on save
        if ('Notification' in window && Notification.permission === 'default') {
            await Notification.requestPermission();
        }

        let alarms = getAlarms();
        if (editId) {
            const idx = alarms.findIndex(a => a.id === editId);
            if (idx >= 0) {
                alarms[idx].time = time;
                alarms[idx].days = selectedDays;
            }
        } else {
            alarms.push({ id: Date.now(), time, days: selectedDays, enabled: true });
        }

        alarms.sort((a, b) => a.time.localeCompare(b.time));
        saveAlarms(alarms);
        closeAlarmEditor();
        refreshAlarmUI();
    }

    function toggleAlarm(id) {
        let alarms = getAlarms();
        const alarm = alarms.find(a => a.id === id);
        if (alarm) {
            alarm.enabled = !alarm.enabled;
            saveAlarms(alarms);
            refreshAlarmUI();
        }
    }

    function deleteAlarm(id) {
        let alarms = getAlarms().filter(a => a.id !== id);
        saveAlarms(alarms);
        refreshAlarmUI();
    }

    function refreshAlarmUI() {
        const list = document.getElementById('alarmList');
        if (list) list.innerHTML = renderAlarmList();
    }

    window._alarmTimers = [];
    function scheduleAllAlarms() {
        window._alarmTimers.forEach(t => clearTimeout(t));
        window._alarmTimers = [];

        const alarms = getAlarms().filter(a => a.enabled);
        const now = new Date();
        const jsDay = now.getDay();
        const today = jsDay === 0 ? 6 : jsDay - 1; // 0=Mon, 6=Sun

        alarms.forEach(alarm => {
            const [h, m] = alarm.time.split(':').map(Number);

            for (let offset = 0; offset < 7; offset++) {
                const checkDay = (today + offset) % 7;
                if (!alarm.days.includes(checkDay)) continue;

                let target = new Date();
                target.setDate(target.getDate() + offset);
                target.setHours(h, m, 0, 0);

                if (target <= now) {
                    if (offset === 0) continue;
                }

                const delay = target - now;
                if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
                    const timer = setTimeout(() => {
                        if (Notification.permission === 'granted') {
                            new Notification('English Daily Practice', {
                                body: 'Bugunun kelimelerini calistinmi? Hadi pratik yapalim!',
                                icon: './icon-192.png',
                                tag: 'alarm-' + alarm.id
                            });
                        }
                        scheduleAllAlarms();
                    }, delay);
                    window._alarmTimers.push(timer);
                }
                break;
            }
        });

        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
                type: 'SCHEDULE_ALARMS',
                alarms: alarms
            });
        }
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        // updateViaCache: 'none' forces the browser to always check network for sw.js
        // (fixes stale PWA installations that never pick up new versions)
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(reg => {
            console.log('SW registered:', reg.scope);
            navigator.serviceWorker.ready.then(() => {
                scheduleAllAlarms();
            });

            // Check for updates on load and every 30 seconds while app is open
            reg.update();
            setInterval(() => reg.update(), 30000);

            // Also check when user returns to the app (important for PWA)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') reg.update();
            });

            // When a new SW is found, activate it and reload
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // New version available - skip waiting and reload
                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                });
            });
        }).catch(err => console.log('SW failed:', err));

        // Reload once when a new SW takes control
        let sawSwReload = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (sawSwReload) return;
            sawSwReload = true;
            window.location.reload();
        });
    }

    // ==================== SYNC MODAL ====================
    function openSyncModal() {
        const modal = document.getElementById('syncModal');
        const body = document.getElementById('syncModalBody');
        const connected = window.FirebaseSync && window.FirebaseSync.isConnected();
        const code = window.FirebaseSync && window.FirebaseSync.getSyncCode();

        if (connected && code) {
            body.innerHTML = `
                <div style="color:#22c55e; font-size:14px; margin-bottom:10px;">&#10003; Bu cihaz senkronize</div>
                <div style="color:#94a3b8; font-size:13px; margin-bottom:15px;">Senkronizasyon kodun:</div>
                <div style="background:#0f172a; border:2px dashed #38bdf8; border-radius:8px; padding:20px; text-align:center; font-size:28px; font-weight:bold; color:#38bdf8; letter-spacing:8px; margin-bottom:15px;">${code}</div>
                <div style="color:#94a3b8; font-size:13px; margin-bottom:15px;">Baska cihazda bu kodu girerek ayni veriye erisebilirsin. Telefon ile bilgisayar arasinda otomatik senkron olacak.</div>
                <button onclick="disconnectSyncConfirm()" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ef4444; background:transparent; color:#ef4444; cursor:pointer; font-size:14px;">Bu cihazdan baglanti kes</button>
            `;
        } else {
            body.innerHTML = `
                <div style="color:#94a3b8; font-size:14px; margin-bottom:15px;">Ilerlemeni telefon ve bilgisayar arasinda senkronize et.</div>

                <div style="margin-bottom:20px;">
                    <div style="color:#38bdf8; font-size:14px; font-weight:600; margin-bottom:8px;">1. Yeni Senkron Baslat</div>
                    <div style="color:#64748b; font-size:12px; margin-bottom:10px;">6 haneli bir kod olusturur. Diger cihazda bu kodu gir.</div>
                    <button onclick="createSyncNow()" style="width:100%; padding:10px; border-radius:6px; border:none; background:#38bdf8; color:#fff; cursor:pointer; font-size:14px; font-weight:600;">Senkron Kodu Olustur</button>
                </div>

                <div style="border-top:1px solid #334155; padding-top:20px;">
                    <div style="color:#22c55e; font-size:14px; font-weight:600; margin-bottom:8px;">2. Mevcut Kodla Baglan</div>
                    <div style="color:#64748b; font-size:12px; margin-bottom:10px;">Diger cihazindan aldigin 6 haneli kodu gir.</div>
                    <input id="syncCodeInput" type="text" inputmode="numeric" maxlength="6" placeholder="123456" style="width:100%; padding:10px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; font-size:18px; text-align:center; letter-spacing:6px; margin-bottom:10px;">
                    <button onclick="joinSyncNow()" style="width:100%; padding:10px; border-radius:6px; border:none; background:#22c55e; color:#fff; cursor:pointer; font-size:14px; font-weight:600;">Bu Kodla Baglan</button>
                </div>

                <div id="syncModalMsg" style="margin-top:15px; font-size:13px; text-align:center;"></div>
            `;
        }
        modal.style.display = 'flex';
    }

    function closeSyncModal() {
        document.getElementById('syncModal').style.display = 'none';
    }

    async function createSyncNow() {
        const msg = document.getElementById('syncModalMsg');
        msg.style.color = '#94a3b8';
        msg.textContent = 'Kod olusturuluyor...';
        try {
            await window.FirebaseSync.createSyncCode();
            openSyncModal(); // re-render with connected state
        } catch(e) {
            msg.style.color = '#ef4444';
            msg.textContent = 'Hata: ' + e.message;
        }
    }

    async function joinSyncNow() {
        const input = document.getElementById('syncCodeInput');
        const msg = document.getElementById('syncModalMsg');
        const code = input.value.trim();
        if (!/^\d{6}$/.test(code)) {
            msg.style.color = '#ef4444';
            msg.textContent = 'Kod 6 haneli sayi olmali';
            return;
        }
        msg.style.color = '#94a3b8';
        msg.textContent = 'Baglaniliyor...';
        try {
            await window.FirebaseSync.joinSyncCode(code);
            closeSyncModal();
            setTimeout(() => location.reload(), 500);
        } catch(e) {
            msg.style.color = '#ef4444';
            msg.textContent = e.message;
        }
    }

    function disconnectSyncConfirm() {
        if (confirm('Bu cihazin senkronizasyonu kesilecek. Yerel veriler silinmez. Devam?')) {
            window.FirebaseSync.disconnectSync();
            closeSyncModal();
        }
    }

    // When remote data comes in, refresh local state and re-render
    window.onSyncRemoteUpdate = () => {
        state = loadState();
        customWords = loadCustomWords();
        learnedPatterns = loadLearnedPatterns();
        wordCategories = loadWordCategories();
        updateStats();
        if (currentStage) {
            const activeBtn = document.querySelector('.stage-btn.active');
            navigateStage(currentStage, activeBtn);
        }
    };

    // ==================== INIT ====================
    // Clear old sentence cache without Turkish translations (one-time migration)
    const CACHE_VERSION_KEY = 'english_cache_version';
    if (localStorage.getItem(CACHE_VERSION_KEY) !== 'v2') {
        localStorage.removeItem(SENTENCE_CACHE_KEY);
        sentenceCache = {};
        localStorage.setItem(CACHE_VERSION_KEY, 'v2');
    }

    selectDailyWords();
    checkBadges(); // backfill any badges earned before gamification was added
    renderDashboard(document.getElementById('contentArea'));
    updateStats();

    // Show install banner on iOS (no beforeinstallprompt)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    if (isIOS && !isStandalone && !localStorage.getItem('pwa_banner_dismissed')) {
        const banner = document.getElementById('pwaBanner');
        banner.classList.add('show');
        document.getElementById('pwaInstallBtn').textContent = 'Nasil?';
        document.getElementById('pwaInstallBtn').onclick = () => {
            alert('Safari\'de alt menudeki Paylas butonuna bas, sonra "Ana Ekrana Ekle" secenegine tikla.');
        };
    }
    </script>
